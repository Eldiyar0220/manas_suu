dataSource: false

dataModel: false

dataRepository: false

entityModel: false

domainRepository: false

usecase: false

#!/bin/bash
# ----M.V.P-------------------------------------------------------> start
generate:
# ---Data------------------------------------------------------
  - category: data
    contents:
      - folder: models
        contents:
          - file: NAME_model.dart
            code: |
              import 'package:json_annotation/json_annotation.dart';

              part 'LOWER_CASE_model.g.dart';

              @JsonSerializable()
              class NAMEModel {
                final int id;
                final String name;
                final String email;
                final bool isActive;

                NAMEModel({
                  required this.id,
                  required this.name,
                  required this.email,
                  required this.isActive,
                });

                factory NAMEModel.fromJson(Map<String, dynamic> json) =>
                    _$NAMEModelFromJson(json);

                Map<String, dynamic> toJson() => _$NAMEModelToJson(this);
              }
      - folder: repository
        contents:
          - file: NAME_repository_impl.dart
            code: |
              import 'package:dio/dio.dart';
              import 'package:injectable/injectable.dart';

              @Singleton(as: NAMERepository)
              class NAMERepositoryImpl implements NAMERepository {
                NAMERepositoryImpl(this._dio);
                final Dio _dio;

                final String _getList = 'API';

                @override
                Future<List<NAMEModel>> getNAMEList(int? id) async {
                  final response = await _dio.get('endpoint/$id/$_getList');
                  // TODO: подставь нужный парсер под свой API
                  return [NAMEModel.fromJson(response.data as Map<String, dynamic>)];
                }
              }

# ---Domain----------------------------------------------------          
  - category: domain
    contents:
      - folder: interactor
        contents:
          - file: NAME_interactor.dart
            code: | 
              import 'package:injectable/injectable.dart';

              @singleton
              class NAMEInteractor {
                NAMEInteractor(this._repository);
                final NAMERepository _repository;

                Future<List<NAMEModel>> getNAMEList(int? id) async {
                  try {
                    return await _repository.getNAMEList(id);
                  } catch (e) {
                    rethrow;
                  }
                }
              }
      - folder: repository
        contents:
          - file: NAME_repository.dart
            code: | 
              abstract class NAMERepository {
                Future<List<NAMEModel>> getNAMEList(int? id);
              }
# ---Presentation----------------------------------------------
  - category: presentation
    contents:
      - folder: widgets
      - folder: bloc
        contents:
          - file: NAME_bloc.dart
            code: | 
              import 'package:equatable/equatable.dart';
              import 'package:flutter_bloc/flutter_bloc.dart';

              part 'LOWER_CASE_event.dart';
              part 'LOWER_CASE_state.dart';

              class NAMEBloc extends Bloc<NAMEEvent, NAMEState> {
                NAMEBloc(this._interactor) : super(NAMELoadingState()) {
                  on<NAMEEvent>(_onEvent);
                }

                final NAMEInteractor _interactor;

                Future<void> _onEvent(NAMEEvent event, Emitter<NAMEState> emit) async {
                  switch (event) {
                    case LoadNAMEEvent():
                      await _onLoadNAME(event, emit);
                      break;
                    case GetNAMECheckEvent():
                      await _getNAMECheck(event, emit);
                      break;
                  }
                }

                Future<void> _onLoadNAME(
                  LoadNAMEEvent event,
                  Emitter<NAMEState> emit,
                ) async {
                  emit(NAMELoadingState());
                  try {
                    final items = await _interactor.getNAMEList(event.id);
                    emit(NAMESuccessState(items: items));
                  } catch (e) {
                    emit(NAMEErrorState(message: e.toString()));
                  }
                }

                Future<void> _getNAMECheck(
                  GetNAMECheckEvent event,
                  Emitter<NAMEState> emit,
                ) async {
                  // TODO: реализуешь при необходимости
                }
              }

          - file: NAME_event.dart
            code: |   
              part of 'LOWER_CASE_bloc.dart';
              sealed class NAMEEvent extends Equatable {}

              class LoadNAMEEvent extends NAMEEvent {
                LoadNAMEEvent({required this.id});
                final int id;

                @override
                List<Object?> get props => [id];
              }

              class GetNAMECheckEvent extends NAMEEvent {
                @override
                List<Object?> get props => [];
              }
          - file: NAME_state.dart
            code: |
              part of 'LOWER_CASE_bloc.dart';
              sealed class NAMEState extends Equatable {}

              class NAMESuccessState extends NAMEState {
                NAMESuccessState({required this.items});
                final List<NAMEModel> items;

                @override
                List<Object?> get props => [items];
              }

              class NAMELoadingState extends NAMEState {
                @override
                List<Object?> get props => [];  
              }

              class NAMEErrorState extends NAMEState {
                NAMEErrorState({required this.message});
                final String message;

                @override
                List<Object?> get props => [message];
              }

      - folder: pages
        contents:
          - file: NAME_page.dart
# ------------------------------------------------------------- end

